<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <title>Ativação Looplay</title>   
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const scene = document.querySelector("a-scene");

  let ambientAudio = null;
  let avatar = null;
  const originalScale = "0.15505 0.15505 0.15505";

  scene.addEventListener("renderstart", () => {

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const camera = scene.camera;

    const target = document.querySelector("[mindar-image-target]");
    avatar = document.querySelector("#avatar");
    const buttons = document.querySelectorAll(".clickable");

    
    // 🔹 SALVA POSIÇÃO FINAL ORIGINAL (UMA VEZ)
    buttons.forEach(btn => {
      const pos = btn.getAttribute("position");
      btn.dataset.finalX = pos.x;
      btn.dataset.finalY = pos.y;
      btn.dataset.finalZ = pos.z;

      // começa sempre atrás
      btn.object3D.position.z = -0.25;
    });

    // ============================
    // TARGET FOUND
    // ============================
    target.addEventListener("targetFound", () => {

      /* ---------- BOTÕES ---------- */
      buttons.forEach((btn, index) => {

        btn.removeAttribute("animation__enter");

        // garante que começa atrás
        btn.object3D.position.z = -0.25;

        btn.setAttribute("animation__enter", {
          property: "position",
          from: `${btn.dataset.finalX} ${btn.dataset.finalY} -0.25`,
          to: `${btn.dataset.finalX} ${btn.dataset.finalY} ${btn.dataset.finalZ}`,
          dur: 900,
          delay: index * 120,
          easing: "easeOutBack"
        });
      });

      /* ---------- AVATAR (SQUASH & STRETCH) ---------- */
      avatar.removeAttribute("animation__squash");
      avatar.removeAttribute("animation__stretch");

      avatar.setAttribute("scale", "0.15505 0.01 0.15505");

      avatar.setAttribute("animation__squash", {
        property: "scale",
        to: "0.18 0.05 0.18",
        dur: 250,
        easing: "easeOutQuad"
      });

      avatar.setAttribute("animation__stretch", {
        property: "scale",
        from: "0.18 0.05 0.18",
        to: originalScale,
        dur: 450,
        delay: 250,
        easing: "easeOutElastic"
      });

      /* ---------- ÁUDIO ---------- */
      ambientAudio = document.getElementById("audioAmbiente");
      ambientAudio.volume = 1.0;
      ambientAudio.loop = true;
      ambientAudio.play();
    });

    // ============================
    // TARGET LOST
    // ============================
    target.addEventListener("targetLost", () => {

      avatar.setAttribute("scale", originalScale);

      buttons.forEach(btn => {
        btn.object3D.position.z = -0.25;
        btn.removeAttribute("animation__enter");
      });
    

      if (ambientAudio) {
        ambientAudio.pause();
        ambientAudio.currentTime = 0;
      }
    });

    // ============================
    // CLIQUES / TOQUES
    // ============================
    function checkHit(x, y) {
      
      const clickable = Array.from(document.querySelectorAll(".clickable"))
        .map(el => el.object3D);

      const intersects = raycaster.intersectObjects(clickable, true);

      if (intersects.length > 0) {
        const obj = intersects[0].object.el;
        if (!obj) return;

        if (obj.hasAttribute("open-insta")) window.location.href = "https://instagram.com";
        if (obj.hasAttribute("open-face")) window.location.href = "https://forms.gle/vsEtZxiAF53CEA8a9";
        

        
      }
    }

    // TOUCH (tocar)
    window.addEventListener("touchstart", e => {
      e.preventDefault();
      const t = e.touches[0];
      checkHit(t.clientX, t.clientY);
    }, { passive: false });

    // MOUSE
    window.addEventListener("mousedown", e => {
      checkHit(e.clientX, e.clientY);
    });

  });
});
  
  
</script>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: Imagens/targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="card" src="Imagens/fundo_interacao2.png">
        <img id="instaIcon" src="Imagens/btn_Visitante.png">
        <img id="faceIcon" src="Imagens/btn_Empresa.png">
        
       
        <audio id="audioAmbiente" src="Audios/Musica.mp3"></audio>
      

        <a-asset-item id="avatarModel" src="Modelos/logo.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-cursor rayOrigin="mouse"></a-cursor>
      </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

    <a-plane src="#card" position="0 0 0" height="1.5" width="1" material="roughness: 1; metalness: 0;"></a-plane>

    <!-- CONTAINER DO MODELO -->
    <a-entity id="avatarContainer" position="0 0.05 0.2" rotation="0 0 0" scale="1 1 1">
      
        <a-gltf-model
            id="avatar" src="#avatarModel" position="0 0 0" rotation="0 0 0" scale="0.15 0.15 0.15" 
            animation=" property: rotation; from: 0 0 0; to: 0 360 0; dur: 10000; easing: linear; loop: true;">
        </a-gltf-model>

    </a-entity>

    <a-image src="#instaIcon" position="-0.02081 -0.44414 0.04643" width="0.5" height="0.15" open-insta class="clickable"></a-image>

    <a-image src="#faceIcon" position="-0.02081 -0.6414 0.04643" width="0.5" height="0.15" open-face class="clickable"></a-image>

</a-entity>

    </a-scene>
  </body>
</html>
